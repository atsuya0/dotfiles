# https://yazi-rs.github.io/docs/configuration/yazi
# https://github.com/sxyazi/yazi/blob/shipped/yazi-config/preset/yazi-default.toml
[mgr]
append_keymap = [
	{ on = "A-d", run = [ "/Users/atsuya/workspace/go/bin/trs", "move" ] }
]

[preview]
image_quality = 90

[opener]
image_viewr = [
	{ run = '/Users/atsuya/dotfiles/bin/images_viewer.sh "$1"', block = true, orphan = true, for = "unix" },
]
video_viewr = [
	{ run = 'open -a /Applications/Elmedia\ Video\ Player.app "$1"', block = false, orphan = true, for = "unix" },
]

[open]
prepend_rules = [
	{ url = "*/", use = "image_viewr" },
	{ mime = "video/*", use = "video_viewr" },
]
