# https://sw.kovidgoyal.net/kitty/conf/

font_family HackGenConsoleNF
font_size 14
bold_font auto
italic_font auto
bold_italic_font auto
symbol_map U+3000-U+9FFF IPAexGothic

cursor_shape block
cursor_blink_interval 0

cursor #495872
cursor_text_color #c0c5ce
foreground #c0c5ce
background #2b303b
# black
color0 #2b303b
# red
color1 #bf616a
# green
color2 #a3be8c
# yellow
color3 #ebcb8b
# blue
color4 #8fa1b3
# magenta
color5 #b48ead
# cyan
color6 #96b5b4
# white
color7 #c0c5ce
# brightBlack
color8 #65737e
# brightRed
color9 #bf616a
# brightGreen
color10 #a3be8c
# brightYellow
color11 #ebcb8b
# brightBlue
color12 #5597d9
# brightMagenta
color13 #b48ead
# brightCyan
color14 #96b5b4
# brightWhite
color15 #eff1f5

macos_option_as_alt both
allow_remote_control yes
listen_on unix:/tmp/mykitty

tab_bar_min_tabs 1
tab_bar_edge top
tab_bar_style slant
active_tab_font_style normal
tab_title_template "{fmt.fg.tab}{index}.{title}"

enable_audio_bell no
scrollback_lines 10000
scrollback_pager_history_size 4000
scrollback_pager tee ~/scrollback.log
enabled_layouts Horizontal,Vertical
# フォーカスが当たってない5秒以上掛かったコマンドが終了したときに通知を送る
notify_on_cmd_finish unfocused 5.0
# 選択で自動コピー
copy_on_select yes
# 制限なし
clipboard_max_size 0

# コピー&ペースト(copy_on_select yesなのでコピーは使わないはず)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# プロンプトごとにスクロール
map ctrl+shift+p scroll_to_prompt -1
map alt+p scroll_to_prompt -1
map ctrl+shift+n scroll_to_prompt 1
map alt+n scroll_to_prompt 1

# コマンド実行結果のコピー
map alt+c launch --stdin-source=@last_visited_cmd_output --type=clipboard

# スクロールバッファー全体のコピー
map alt+a launch --stdin-source=@screen_scrollback --type=clipboard

# コマンド実行結果を選択(Ctrlを押しながらクリック)
mouse_map ctrl+left press grabbed,ungrabbed mouse_select_command_output
